<mat-toolbar>
  <span>{{ 'app.title' | t }}</span>
  @if (session.oidcEnabled) {
    @if (session.authenticated()) {
      <button class="session" mat-button (click)="session.logout()">{{ 'app.logout' | t }}</button>
    } @else {
      <button class="session" mat-button (click)="session.login()">{{ 'app.login' | t }}</button>
    }
  } @else {
    <input
      class="dev-roles"
      [value]="auth.devRoles()"
      (change)="setDevRoles($event)"
      [attr.placeholder]="'app.devRoles' | t"
      [attr.aria-label]="'app.devRoles' | t"
    />
  }
</mat-toolbar>
<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened>
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >{{ 'nav.agents' | t }}</a
      >
      <a mat-list-item routerLink="/inbox" routerLinkActive="active">{{ 'nav.inbox' | t }}</a>
      <a mat-list-item routerLink="/runs" routerLinkActive="active">{{ 'nav.runs' | t }}</a>
      @for (entity of entities; track entity.path) {
        <a mat-list-item [routerLink]="entity.path" routerLinkActive="active">{{
          entity.title | t
        }}</a>
      }
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <main class="app-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
