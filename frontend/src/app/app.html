<mat-toolbar>
  <span>{{ title() }}</span>
</mat-toolbar>
<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened>
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Agenten</a
      >
      <a mat-list-item routerLink="/inbox" routerLinkActive="active">Postbox</a>
      <a mat-list-item routerLink="/runs" routerLinkActive="active">Runs</a>
      @for (entity of entities; track entity.path) {
        <a mat-list-item [routerLink]="entity.path" routerLinkActive="active">{{ entity.title }}</a>
      }
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <main class="app-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
