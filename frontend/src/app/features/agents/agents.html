<section class="agents">
  <h2>Agenten</h2>

  <form class="agent-form" (ngSubmit)="create()">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput name="name" [(ngModel)]="name" required />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Ziel (optional)</mat-label>
      <input matInput name="goal" [(ngModel)]="goal" />
    </mat-form-field>
    <button mat-flat-button type="submit">Anlegen</button>
  </form>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  } @else if (agents().length === 0) {
    <p>Noch keine Agenten.</p>
  } @else {
    <mat-list>
      @for (agent of agents(); track agent.id) {
        <mat-list-item>
          <span matListItemTitle>{{ agent.name }}</span>
          <span matListItemLine>
            {{ agent.status }}
            @if (agent.goal) {
              · {{ agent.goal }}
            }
          </span>
          <button matListItemMeta mat-button (click)="run(agent)">Ausführen</button>
        </mat-list-item>
      }
    </mat-list>
  }
</section>
